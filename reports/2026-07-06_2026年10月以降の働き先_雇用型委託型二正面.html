<script id="src" type="text/plain"># レポート: 2026年10月以降の働き先（雇用型トラックA・委託型トラックB 二正面）
調査日: 2026-07-06 / 依頼書: requests/2026-07-06_2026年10月以降の働き先_雇用型委託型二正面.md
対象者: 40代後半・東京在住・PE投資／政府系ファンド(観光)／従業員40名企業COO・中小企業診断士・宅建士・零細コンサル実績・AI業務自動化スキル

---

## 0. 依頼内容の要約
現職（政府系ファンド）が2026年9月末で契約満了。10月以降を2トラックで並行探索し、本人が最終判断する。
- **トラックA（雇用型）**: 正社員/常勤契約。東京23区orリモート併用／想定年収600万円以上／2026年10月〜2027年1月入社可。3年後の住宅ローンで「給与所得者属性」を使う前提。
- **トラックB（委託型・週2〜3日）**: 業務委託/委嘱。月収25万円以上／東京orリモート／**競業・利益相反（支援先の顧客化制約）の有無を必ず確認**。残り時間を自身のAI活用支援事業に充てる。

**本業時間確保度（5段階）**: 5=拘束最小・副業自由度最大 ／ 1=常勤フルタイムで副業困難。

> 注記: 求人・公募は掲載時点で条件が読み取れないものが多く、年収・リモート・入社時期・報酬額・競業条項に「要確認」が多数残る。裏取り不可の情報は各項の注記と第7章「未確認事項」に隔離した。全項目に出典URLを付す。

---

## 総括（要点3行）
1. **雇用型A**は、候補者の資格・経歴が要件に直撃する **東京都中小企業振興公社（正規職員）**、経歴・年収とも整合する **フロンティア・マネジメント／山田CG**、承継×DXの **浜銀総研／きらぼしコンサル** が有力。ただし公的系は年収600万到達が、民間ブティックは激務・仲介ノルマ性が論点。
2. **委託型B**は、**よろず支援拠点CO（日額2.5〜3.3万円・週1〜4日・兼業可）** と **中小機構アドバイザー（1事案5万円／関東本部R8で「AIエージェント構築経験者」を名指し募集）** が候補者に直撃し、通過条件（週2〜3で月25万）を最も安定的に満たす。顧問PF（HiPro Biz/ProSharing/顧問名鑑/マイナビ顧問/KENJINS等）は掛け持ちで達成可能。
3. **重要な横断リスク**: トラックBのほぼ全ルートで「支援先の顧客化」に制約がかかる。国委託系（よろず/承継/公社）は**中立義務**、顧問PF（KENJINS・ビザスク・みらいワークス）は**直接契約/迂回の明文禁止**。→ 自身のAI支援事業の顧客獲得は「委託業務とは別チャネル」で行う前提が安全。

### Aランクの選定理由（各5件以上を満たす）
- **東京都中小企業振興公社**: 応募要件が「中小企業診断士としての支援経験、または金融機関等での中小企業支援実務」で候補者に直撃。採用が4/7/10/1月サイクルで**10月・1月入社の条件に合致**。営業ノルマ・仲介性なし。唯一の弱点は年収600万到達可否（月285,600円起点＋職歴加算）で**要人間判断／要照会**。
- **フロンティア・マネジメント**: PE・事業再生・経営執行支援と候補者のPE/COO経歴が親和。年収水準は条件を十分満たす見込み。弱点は激務（残業58h／勤続約3年）と組織規模大（共通選好「10名以下」から外れる）。
- **山田CG**: 正社員・丸の内・診断士歓迎で事業承継を正面から扱う。弱点はポテンシャル枠の想定下限が600万を割る点（経験者枠のレンジを要確認）と激務口コミ。
- **浜銀総研**: 事業承継・企業再生・診断士が活きる。年収も十分。弱点は横浜勤務（23区外）で、リモート併用の実運用が条件充足の鍵。
- **きらぼしコンサルティング**: 港区・在宅あり・承継/DXと立地×業務が好適。弱点は年収非記載＋「正社員登用想定」表現（入口の雇用形態）を要確認。

### Aランクの選定理由（5件を満たす）
- **よろず支援拠点CO**: CO要件（IT活用・生産性向上・事業承継の知見 or 診断士）に候補者が直撃。**日額25,000〜33,000円×週2〜3日で月20〜40万円**、制度上**兼業可**で自事業と並行しやすい。東京・神奈川はAI/DX枠の募集実績あり。唯一、東京拠点は「月6日下限」のため月25万到達には月10日程度が必要（要交渉）。
- **中小機構アドバイザー**: **1事案5万円**と単価が高く、**関東本部R8公募が「DX推進・AIエージェント構築経験者」を名指し募集**＝候補者のAI自動化スキルに直撃。登録可能性が高い。弱点は「登録≠仕事保証」で稼働の連続性が読めない（シニア枠は月10-15事案で見込み明確）。
- **東京都事業承継・引継ぎ支援センター SM**: **週2〜3日**が明記され通過条件の稼働に合致。診断士等＋承継実務要件で適格、70歳未満で年齢問題なし。弱点は報酬が金額非公開（月20〜30万想定）と、次回公募が2027年2〜3月まで待ち。
- **顧問PF（紹介型）**: COO＋PE＋政府系＋診断士は各社が最も紹介しやすい経営/新規事業/再生/資金調達領域に合致。単価非公開だが相場 月10〜50万/社、掛け持ちで通過条件達成可能。営業ノルマなし（紹介反響型）で共通選好に合致。
- **コンサル系業務委託（DD/PMI/バリューアップ）**: PE・M&A・COO経歴が最もフィット。週2換算で月40〜75万と単価は高い。弱点はSCB等の「戦略ファーム出身」審査、PE投資先ハンズオンの委託公募が市場に出にくい到達難。

- OpenWork等の口コミ・平均年収は投稿者バイアスのある集計値で、求人票の保証値ではない（伝聞として記載）。
