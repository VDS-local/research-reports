<script id="src" type="text/plain"># レポート: 業務委託パートナー候補となる小規模M&A・事業承継・中小企業支援ファーム ロングリスト

調査日: 2026-07-06 / 依頼書: requests/2026-07-06_業務委託パートナー候補_小規模M&A事業承継ファーム.md
情報の時点: 2026-07-06 に公開されていた各社サイト・公的名簿・SNSの範囲。全項目に出典URLを付す。裏取り不可は「未確認」または本文末尾へ隔離。

---

## 依頼内容の要約
- **目的**: 求人応募ではなく、案件ベースの業務委託（DD／事業計画策定／企業価値磨き上げ／PMI／承継支援実務等）で**協業できる小規模ファーム（概ね15名以下）のロングリスト**作成。
- **起点4ソース**: ①M&A支援機関登録制度 ②認定経営革新等支援機関 ③事業承継・引継ぎ支援センターの登録民間機関（東京/神奈川/埼玉/千葉）④バトンズ/TRANBI等の専門家掲載法人（公開情報のみ）。
- **除外**: 保険・金融商品販売が主業／補助金申請代行が主業／大手・上場・大規模ファーム。
- **スコア**: A＝外部専門家と組む文化が明確＋案件が現に回る＋代表発信から協業提案が届きそう／B＝実態は良いが外部連携の形跡が不明／C＝情報が薄い・案件が回るか疑わしい。
- **承認時の決定**: 一気通貫／公開情報のみ／**依頼者の強み（PE目線バリューアップ＋AI業務自動化）と噛み合う先を優先加点**。

## 結果サマリー（3行）
1. **通過41社（A 11社／B 20社／C 10社）** を抽出。目標「30〜50社・Aランク10社以上」を充足。
2. **業務委託パートナー・登録専門家の募集を明示している先**（協業の入口が最も明確）＝中小企業経営支援事務所／KICK／ウィルリンクス／日本PMIサポート協会／IRI／ツグナラ（サクシード）／ビジネスサクセション。
3. **AI/DX・PEバリューアップと噛み合う先**（依頼者の強みと直結）＝COUNTRY X（ma_watch）／企業支援総合研究所（CSRI・人材起点PE）／オーナーズ（RISONAL）／英知／バリューアップコンサルティング。

> 全体注記: 4ソースのうち①②④は個社を特定できたが、**③各都県の事業承継・引継ぎ支援センターは「登録専門家の実名リスト」を一般公開していない**（センター公式で確認）。そのため③由来の社は「自社サイトで認定/登録を明示している小規模ファームを、認定支援機関検索・地域M&A媒体経由で拾い裏取り」する代替方式を採った。発見元は正直にその旨を記載している。

## Aランク各社の所見（どこが協業余地か）

**A1 株式会社中小企業経営支援事務所** — 本調査で**最も協業の入口が明確**。公式に「業務委託パートナー（診断士等）」を募集し、委託業務が「事業計画策定・経営コンサル・事業承継支援」と依頼者の実務そのもの。着手金＋成功報酬・在宅可・メンター体制で参画障壁が低い。募集要件で「AI等の新技術活用を歓迎」と明記しており、依頼者のAI業務自動化スキルを差別化として提示しやすい。留意点は補助金比重の高さ（承継・経営改善もコアだが）と規模18名（委託含むため実コアは少人数）。
*出典: https://www.sme-support.co.jp/partner/ , https://www.sme-support.co.jp/company/*

**A2 KICKコンサルティング株式会社** — 「パートナーコンサルタント募集」で診断士・会計士等を**業務委託形式・案件ごと報酬**で受け入れる仕組みが確立。企業価値向上（診断書/評価書）・経営改善・再生が主で、PE目線の企業価値磨き上げと親和性が高い。2024年度支援167社と案件が現に回っている。AI発信は薄いため、依頼者側からAI活用を提案する余地がある。
*出典: https://www.kick-konsulting.com/partner-recruitment3/ , https://www.kick-konsulting.com/*

**A3 株式会社ウィルリンクス** — 弁護士・会計士・税理士・診断士等との**士業ネットワーク＋パートナー募集ページ**を持ち、外部専門家を組み込む文化が明確。経営企画・中長期戦略・計数計画という「経営者と1対1で作る」領域が中心で、COO/PE経験と噛み合う。コラムで「経理DX」に言及があり、AI業務自動化の提案余地も。支援500社超で実績も厚い。
*出典: https://will-links.jp/recruit/index.html , https://will-links.jp/*

**A4 一般社団法人 日本PMIサポート協会** — **パートナー9名の登録専門家ネットワークが組織の骨格**そのもので、外部専門家として参画する前提の器。PMI（M&A後統合）特化は依頼者のCOO経験・現場推進力が最も活きる領域。パートナーに「IT・DX・生成AI」専門家が既におり、AI×PMIの文脈で提案が通りやすい。2025年5月設立と新しく案件蓄積は要確認だが、**今まさに人を集めている立ち上げ期＝参画しやすい**。
*出典: https://pmi-support.jp/about_us*

**A5 株式会社COUNTRY X（ma_watch）** — **依頼者のAIスキルと最も直結**。代表が「M&A×生成AI」をnote/Xで継続発信し、サービス「バーチャル経営企画室」にAI活用支援が組み込まれている。中計策定・新規事業・利益改善という経営企画実務＋AIの掛け算が刺さる。発信が活発で**協業提案が届きやすい**。2024年設立の少人数で、AI実装できる外部人材の希少価値が高く出る先。

## 調査の限界と未確認事項
- **人員規模の確定が最大の弱点**。「概ね15名以下」を数値で確認できたのは、クラリス（4）・M&A会計ファイナンス（5）・IRI（4）・ジャーニーズ（4）・ビジサク（9）・かえで（8・外部DB）・CSRI（5・note）・PMIサポート協会（10）・東京経営サポーター（診断士6）等のみ。多くは会社概要に非掲載で【推測】を含む。**A1中小企業経営支援事務所（18名）・A10サクシード・B1オーナーズは15名超の可能性があり「要人間判断」**。厳密確認にはgBizINFO・法人登記・求人票・LinkedInでの人数推計が必要（今回未実施）。
- **③事業承継・引継ぎ支援センターの登録専門家 実名リストは非公開**（東京＝東商、神奈川＝KIP等いずれも）。名簿からの直接同定は不可で、認定支援機関検索・地域M&A媒体（ツグナラ/ma-navigator/BATONZ）経由で代替した。「センター登録専門家である」と明示できた社は今回なし。
- **④公式登録DB本体（ma-shienkikan.go.jp/search）はSSL証明書エラー等でWebFetch不可**。登録の有無は各社サイトの自己申告表記・ミラー（jfsc.jp）に依拠し、登録番号の一次照合は未実施。
- **バトンズ/TRANBIは専門家一覧・個別プロフィールが非ログインで閲覧可能**だったため公開情報のみ使用。問い合わせ・案件詳細はログインが必要で規約に従い立ち入っていない。両者の一覧は多数ページに及び全ページ網羅はしていない。
- **AI/DX発信は「白地」が多い**。X（旧Twitter）投稿の網羅精査はAPI制約で未実施のため、「未確認」は「発信が無い」ことを意味しない。明確に確認できたのはCOUNTRY X・オーナーズ・英知・バリューアップコンサル・ウィルリンクス・Koel・unibox・Byside（AIマッチング）・中小企業経営支援事務所（募集要件）等。
- 成約・支援実績は各社の自己申告値で、第三者裏取りは未実施。画像化された実績ページ（インバース等）は件数のテキスト裏取り不可。
- **千葉県の小規模専業ファーム**はサイトで承継実態まで裏取りできる社を特定できず（センター/銀行/媒体止まり）。みらいアーク（浦安・C7）のみ。

## 次に深掘りするなら
1. **A1・A10・B1の正確な従業員数を確定**（求人票・gBizINFO・登記）。15名以下ならA1は本命、B1オーナーズはAへ格上げ候補。
2. **Aランク各社の「業務委託の報酬体系・稼働条件・競業/利益相反規定」を一次確認**（中小企業経営支援事務所・KICK・ウィルリンクス・IRI・PMIサポート協会・ツグナラの募集ページ／CSRI・COUNTRY Xは問い合わせ）。前回「二正面調査」で論点化した「支援先の顧客化制約」の有無をここで詰める。
3. **AI×M&A発信の一次接触ルート整備**：COUNTRY X（中藤氏・ma_watch）、オーナーズ（作田氏・RISONAL）、アジュール（伊藤氏・note）、CSRI（前田氏・note）はnote/Xで直接届く。依頼者のAI業務自動化ポートフォリオ（Dify/GAS/Claude API）を提示できる形にしておく。
4. **地域外だが協業モデルが理想的な先の再評価**：メビウス（広島・AI×承継）、みらいM&A支援事務所（奈良・診断士パートナー募集）、クレジオ（広島・士業パートナー制度）はフルリモート前提なら候補化可能。
5. **登録DB本体の機械的スクリーニング**：ma-shienkikan.go.jp を「東京・専業・人員1〜10名・FA」で絞り込み、自社サイト＋note/X発信社と突合して未発掘の少人数FAを追加。
6. **バトンズ/TRANBI公開一覧の全ページ走査**（神奈川・埼玉・千葉フィルタ）で少人数事務所を追加抽出。
