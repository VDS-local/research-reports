<script id="src" type="text/plain"># 雇用型トラックA 事業承継・スモールM&A／経営支援ファーム求人調査

**調査日: 2026-07-06 / 依頼書: requests/2026-07-06_2026年10月以降の働き先_雇用型委託型二正面.md（トラックA・部分調査）**

## 本レポートのスコープ
依頼書トラックA（雇用型：正社員/常勤契約社員）のうち、**探索領域1「事業承継・スモールM&Aブティックのアドバイザー職」** と **起点企業5社（山田コンサルティンググループ／NBCコンサルタンツ／みらいコンサルティング／フロンティアマネジメント／事業承継センター）** を対象に、実在URLで裏取りできた案件を収集した。
探索領域2〜5（診断士事務所・サーチファンド/PE投資先支援・公的機関職員・地銀系コンサル子会社）は本レポート未着手（末尾「次に深掘りするなら」に記載）。

> **総括（3行）**
> 1. 起点5社はいずれも中途採用中。**正社員・東京23区・年収600万円以上**が読み取れたのは山田CG（事業承継型M&A/FA）・フロンティア（M&Aアドバイザリー）で、候補者のPE/COO経歴と親和性が高い（Aランク）。NBC・みらい・事業承継センターは条件の一部が未確認で要人間判断（Bランク）。
> 2. ブティック側（経営承継支援・インテグループ・オンデック・ペアキャピタル・M&Aロイヤル・名南M&A）は高年収だが**「仲介・完全成功報酬インセンティブ型（実質営業）」**が多く、除外条件（大量採用テレアポ・ノルマ型）に触れるものは警告/除外に隔離した。
> 3. **本業時間確保度は全件2以下**（常勤フルタイム拘束が原則）。トラックB（委託型）との自由度差は大きい。

## 案件詳細（起点5社＋主要ブティック）

### 1.【A】山田コンサルティンググループ（事業承継型M&A／M&A FA）
- **組織/規模**: 2000年創業、本社 東京都千代田区丸の内。中堅・中小向け事業再生・成長戦略・M&A FAの独立系ファーム。
- **事業内容**: 事業承継プラン策定・実行、自社株承継、グループ再編、M&A FA、DD・バリュエーション。親族／MBO／第三者承継を横断支援。
- **報酬**: M&A FA（ポテンシャル採用）想定年収 500万〜800万円。会社平均は900万円台との集計あり（未確認・伝聞）。
- **勤務地**: 東京都千代田区丸の内1-8-1。リモート可否は未確認。
- **応募資格/選考**: 「社会人経験1年以上＋M&A志向」が必須。簿記2級・M&Aエキスパート・金融法人営業・COO/事業会社M&A経験を歓迎（**候補者のPE・COO・診断士経歴が該当**）。選考ステップは未確認。
- **40〜50代採用**: ポテンシャル枠は年齢制限記載なし。実績は未確認。
- **ネガティブ情報**: OpenWork系で月残業54.6〜58.5時間、離職率高め・激務との口コミ（伝聞）。出典 https://www.openwork.jp/company.php?m_id=a0910000000Fr7r
- **選好条件適合**: 中小オーナーとの1対1提案が中心で適合。ただしFAは成約プレッシャーあり。

### 2.【A】フロンティア・マネジメント（M&Aアドバイザリー）
- **組織/規模**: 独立系。本社 東京都港区六本木（住友不動産六本木グランドタワー41F）。経営執行支援・事業再生・M&A FA・コンサルの4部門。
- **事業内容**: M&Aのオリジネーション〜エクセキューション、M&A戦略立案、バリュエーション、ミッドキャップ/再生M&A。
- **報酬**: 求人票「応相談」。第三者集計で平均約1,000万円超、40代平均は高水準（伝聞）。600万円以上の可能性は高い。
- **勤務地**: 東京都港区。リモート可否未確認。
- **応募資格**: ファイナンス・会計・税務・法務・事業企画経験、または金融機関/事業会社のM&A経験（**候補者のPE・COO経験が該当**）。
- **40〜50代/口コミ**: 上層部は大手コンサル出身中心。月残業58.5時間（一部90時間）、平均勤続約3年、管理職離職やシニアの報酬削減の口コミ（伝聞）。出典 https://www.openwork.jp/company.php?m_id=a0C30000007r1TK

### 3.【B】株式会社経営承継支援（M&Aコンサルタント）
- **組織/規模**: 中堅・中小の事業承継特化。本社 東京都千代田区霞が関。
- **事業内容**: 事業承継コンサル＋M&A仲介・助言。ソーシング〜エグゼキューション一貫。
- **報酬**: 平均年収1,200万円、最高約3,000万円。未経験枠 月給40万円〜。基本給高め＋成約粗利20%のチーム分配、年2回評価。
- **勤務地**: 東京23区（霞が関）。
- **ネガティブ情報**: OpenWorkで退職者2.8/現職3.9と評価割れ。分業制セクショナリズム・労働環境悪化を理由とする退職口コミあり（伝聞）。出典 https://www.openwork.jp/company_answer.php?m_id=a0C10000013FHmS
- **注記**: 職名は「コンサルタント」だが成約粗利連動＝実質M&A仲介営業。警告リスト参照。

### 4.【B】NBCコンサルタンツ（経営コンサルタント）
- **組織/規模**: 1986年創業、会計事務所母体の独立系。本社 東京。36期連続黒字（自社記載・伝聞）。
- **事業内容**: 経営診断・経営指導・後継者育成・事業承継支援・研修・セミナー。
- **報酬**: 中途例 月給30〜45万円（固定残業30h込）／年収450〜675万円。入社8年目で1,000万円例、平均880万円。エントリー帯は600万円を下回る場合あり（要確認）。
- **勤務地**: 東京・札幌・仙台・横浜・名古屋・大阪・福岡（希望考慮）。東京23区勤務可能だが**転勤可能性は要確認**。
- **応募資格**: 簿記2級程度／中小企業診断士／経営者折衝経験／金融・税理士事務所歴のいずれか（**診断士が該当、未経験可**）。
- **注記**: 研修・セミナー比重が大きく、実務がコンサルより教育寄りの可能性（警告参照）。

### 5.【B】みらいコンサルティンググループ（事業承継/経営コンサル）
- **組織/規模**: 独立系。本社 東京。会計士・税理士・社労士・司法書士・金融機関出身者による総合ファーム。全国拠点。
- **事業内容**: 事業承継コンサル、経営コンサル（再生・成長戦略・M&A）、会計・税務、人事労務。チームコンサル型。
- **報酬**: 求人一覧に年収明記なし。OpenWork集計で平均約567万円（伝聞）。退職理由に「給与水準の低さ」の指摘あり。出典 https://www.openwork.jp/company.php?m_id=a09100000080rsC
- **注記**: 現行エントリー一覧の該当職は「公認会計士」「FP（事業承継プラン策定）」。診断士単独の承継コンサル専任枠は一覧上で未確認。

### 6.【B】事業承継センター株式会社（事業承継支援スタッフ）
- **組織/規模**: 少人数の事業承継専業。本社 東京都港区芝公園（東京タワー前）。後継者塾運営が特徴。
- **事業内容**: 承継コンサル、行政・金融機関折衝、セミナー講師、執筆、商品開発、後継者塾運営。
- **報酬**: 公開ページ抽出値「300,000円以上」で月給/年収の別が不明瞭（実額は要問い合わせ）。
- **勤務地/勤務**: 東京都港区。出張少なめ、9:00-18:00。
- **応募/選考**: 履歴書送付→代表取締役面接、筆記/適性なし。資格不問。財務・会計・民法・会社法の実務経験、コーディネーション力、IT基礎（HP作成・メルマガ・動画編集）を求める（**候補者のAI業務自動化・診断士・零細支援実績と親和性が高い**）。
- **40〜50代採用**: 「年齢/性別/経験に引きずられない給与体系」＝年齢不問。
- **選好条件適合**: 少人数・1対1対話・裁量大で選好条件との適合は本群で最も高い。報酬の裏取りが課題。

## 警告リスト（求人票と実態の乖離が疑われる案件・根拠付き）
- **経営承継支援**: 職名「コンサルタント」だが成約粗利20%連動報酬＝実質M&A仲介営業。分業制セクショナリズムの退職口コミ。求人票の「一貫担当」と現場実態の乖離を要確認。出典 https://www.openwork.jp/company_answer.php?m_id=a0C10000013FHmS
- **インテグループ**: 「未経験から稼げる／完全成功報酬」を前面に出す仲介。平均年収1,905万円は成約実績依存で、実態はソーシング営業比重が高い可能性。出典 https://hrsquare.jp/integroup ／ https://www.integroup.jp/recruiting/info/
- **オンデック**: 「未経験歓迎・研修充実」を訴求する仲介（本社大阪）。東京23区勤務可否・営業比重は要確認。出典 https://recruit.ondeck.jp/job_offers/6940 ／ https://www.openwork.jp/company.php?m_id=a0C1000001DM3UB
- **NBCコンサルタンツ**: 「経営コンサル」だが研修・セミナー・後継者育成の比重が大きく、実務が教育・営業寄りである可能性。出典 https://www.nbc-consul.co.jp/recruit/information/information-consulting/
- **事業承継センター**: 報酬表記「300,000円以上」で月給/年収の別が判別不能。年収600万円以上を満たすか未確認。出典 https://www.jigyousyoukei.co.jp/11266-2/

## 除外リスト（理由付き）

<details><summary>除外候補（クリックで展開）</summary>

- **日本M&Aセンター（M&Aコンサルタント）**: 平均年収1,200万円超だが、法人営業を大量採用しテレアポ・飛込で案件発掘、初年度から年1,000〜2,000万円級ノルマ、月残業100時間超の月も、との口コミ多数 → 「大手M&A仲介の大量採用テレアポ・ノルマ型」に該当。出典 https://diamond.jp/articles/-/295135 ／ https://consul-career.com/nihonma-tensyoku/
- **M&Aロイヤルアドバイザリー**: 平均年収約2,400万円・インセンティブ率25%青天井 → 完全成功報酬インセンティブ型の仲介営業色が濃く除外条件に近い。出典 https://yamatohc.co.jp/dd/ma-la_kaisetsu/ ／ https://www.r-agent.com/kensaku/companydetail/e2281/
- **名南M&A**: 東海（名古屋）拠点のM&A仲介で若手証券・銀行出身者歓迎が中心 → 勤務地・想定層が候補者と不一致（東京勤務が確認できず）。出典 https://www.movin.co.jp/finance/kyujin/position_category.php?cid=22

</details>

## 調査の限界と未確認事項
- **入社時期（2026年10月〜2027年1月）**: 全社とも通年採用の記載はあるが、具体的な入社時期の確約は求人票から確認不可（要問い合わせ）。
- **40〜50代の中途採用実績**: 各社とも明示データを確認できず（未確認）。候補者は40代後半のため個別確認が必要。
- **リモート併用可否**: 山田CG・フロンティア等でリモート制度の有無を求人票から確定できず（未確認）。
- **想定年収の実額**: フロンティア「応相談」、ペアキャピタル・事業承継センターは実額不明（要確認）。OpenWork等の平均年収は第三者集計・伝聞で、求人票の保証値ではない。
- **山田CGのポテンシャル枠**（500〜800万円）は下限が600万円未満のため、候補者経歴での提示レンジは面談で要確認。
- **みらいコンサル**の診断士向け事業承継コンサル専任枠は現行エントリー一覧では未確認（会計士・FP職が中心）。
- OpenWork各口コミページは本文全文を精査しておらず、離職率・残業の数値は媒体集計・要約に基づく（一次データは各URLで要精査）。
- Indeed等の集約ページは個別求人の実在確認まで至っていないため本文の案件に採用していない。憶測でのURL記載は行っていない。

## 次に深掘りするなら
1. **探索領域2**（少数精鋭の中小企業診断士事務所・独立系経営コンサル）の求人—候補者の診断士資格と最も親和的。
2. **探索領域3**（サーチファンド／スモールキャップPE／承継ファンドの投資先支援・バリューアップ担当）—PE・COO経歴の直球活用。日系スモールキャップPEは地銀/中小支援機関/事業会社マネジメント出身者を採用との情報あり（要個別確認）。出典 https://www.alpha-academy.com/courses/336/Column/topics/16585
4. **探索領域4・5**（商工会議所・振興公社・産業振興財団の職員採用／地域金融機関系コンサル子会社の承継・経営支援部門）。
4. 起点5社の **入社時期・リモート可否・提示年収レンジ** を採用窓口/エージェント経由で直接確認。
5. OpenWork一次口コミの全文精査（離職率・ノルマ・40代処遇の実態）。
