<script id="src" type="text/plain"># 顧問／副業プロ人材マッチング・プラットフォーム比較調査

作成日: 2026-07-06 ／ 対象: 2026年7月時点の公開情報（非ログイン範囲のみ）

---

## 依頼内容の要約

日本の主要な「顧問マッチング／副業プロ人材マッチング」プラットフォームを、**プロ・顧問側（受注する立場）の視点**で個別に調査。特に以下を各サービスで確認する。

- 名称／運営主体／仕組み
- プロ・顧問側の登録要件（経歴・資格、審査）
- 報酬水準（顧問側が受け取る想定単価：時間・日額・月額のレンジ、手数料率）※出典URL必須
- 稼働形態（週1〜2日、リモート可否、掛け持ち可否）
- 案件獲得難易度（案件数、紹介型か自営型か、営業ノルマの有無）
- 競業避止・秘密保持・利益相反規定
- 支援先を自分の直接顧客化することへの制約（中抜き防止）
- ネガティブ情報（口コミ）

**主対象4社**: 顧問名鑑／顧問バンク／KENJINS／マイナビ顧問
**＋α**: ビザスク／パソナ（ProShare）／みらいワークス Freeconsultant／エッセンス（プロパートナーズ）ほか

**候補者像（想定単価・獲得難易度の評価対象）**: 40代後半・東京在住・PEファンド投資経験・政府系ファンド（観光）経験・従業員40人企業のCOO経験・中小企業診断士・宅建士・零細企業コンサル実績・AI業務自動化スキル。

> **重要な前提の注意**
> - 顧問側が実際に受け取る単価を**公式に単価表として開示している大手はほぼ存在しない**（当事者間の個別交渉、または会員登録後開示）。本レポートで「相場」として示す金額の多くは、各社コラム／第三者比較サイト由来の**業界一般相場**であり、そのプラットフォームでの実受取額を保証するものではない。相場と実額は明確に区別して記載した。
> - 候補者評価内の単価レンジは、上記相場と各社の型からの**【推定】**であり、内定・受注を保証するものではない。

---

## 1. 顧問名鑑（株式会社顧問名鑑／レイスグループ）

**仕組み**
- 運営: 株式会社顧問名鑑（旧レイスマネジメントソリューションズ、2020/11社名変更）。レイスグループ中核事業。2009年に国内初の経営顧問事業を開始。登録顧問数 **43,000名以上（2025年10月末・公式表記）**、支援実績7,000社以上。出典: https://komon.co.jp/ ／ https://komon.co.jp/company/ ／ https://komon.co.jp/kojin/k_about/
- **紹介型（エージェント型）**。企業に専属担当がつき、課題に対し顧問候補を推薦。顧問1名あたり平均4〜5社を支援、専任チーム（営業・案件・事務・チーフ）がサポート。出典: https://komon.co.jp/kojin/k_about/ ／ https://dym.asia/media/advisors-directory/

**登録要件・審査**
- 登録人材は**上場企業の役員・部長OBが中心**（公式表記）。出典: https://komon.co.jp/company/
- 顧問側の登録費用は無料（登録費・営業人件費・交通費は運営負担）。出典: https://komon.co.jp/kojin/k_about/
- 具体的な登録要件・審査基準は**公開情報では確認できず**（未確認）。出典（記載なしの確認元）: https://komon.co.jp/kojin/

**報酬水準**
- **顧問名鑑固有の顧問側受取単価レンジは非公開**。企業向けに「顧問の経歴・支援内容・稼働日数による個別見積もり」とのみ記載。契約は成果報酬でなく**固定報酬型**。出典: https://takuwil.spool.co.jp/column/article/komonmeikan/
- 参考（顧問名鑑固有でなく業界一般相場）: 経営顧問 月10〜50万円/社、週1日規模で月30万円〜、時間単価1〜5万円。出典: https://pasona-proshare.com/column/professional/komon-remuneration-marketprice
- 参考（中小企業診断士の顧問契約統計）: 顧問料1社平均**月14万円**、訪問1社月平均3.4日。出典: https://www.j-smeca.jp/contents/data2016/p05.html

**稼働形態**
- プロジェクト単位・月数回の面談など柔軟。1名平均4〜5社支援＝**掛け持ち前提の設計**。リモート可否の明文規定は未確認。出典: https://takuwil.spool.co.jp/column/article/komonmeikan/ ／ https://komon.co.jp/kojin/k_about/

**案件獲得難易度**
- 紹介型（プッシュ型）で**営業ノルマなし**。案件が来ない場合はプロフィール・実績のブラッシュアップが鍵。案件は経営顧問・社外取締役・新規取引先開拓・DX・資金調達・海外展開など多岐。顧問側の受注頻度・成約率の定量データは未確認。出典: https://www.jinbutsu-note.com/komonmeikan-note/ ／ https://komon.co.jp/kojin/k_cases/

**競業避止・秘密保持・利益相反 ／ 直接顧客化制約**
- 顧問名鑑固有の規定は**公開情報では確認できず**（契約後開示と推測、未確認）。業界一般では守秘義務・競業避止・直接取引禁止条項が置かれるのが標準。出典: https://www.gmosign.com/media/work-style/komon-keiyakusho/ ／ https://office-tree.jp/blog/legal-documents/consulting-contract-guide/

**ネガティブ情報（口コミ）**
- 「営業電話がしつこい／早朝の電話」が複数。出典: https://freeconsul.co.jp/cs/komon-meikan/ ／ https://strate.biz/pro_matching/komonmeikan/
- 担当者が高圧的という声（担当者個人差）。企業側「250万円かけたが目的の企業を獲得できなかった」。出典: https://strate.biz/pro_matching/komonmeikan/ ／ https://toushikomon-hikaku.com/kuchikomi/komonmeikan/
- ※口コミは主に**企業（発注側）視点**。顧問本人視点の「単価が出ない／案件が来ない」告発は公開範囲で未確認。

**候補者評価**
- 主力プロフィールは上場役員・部長OB。候補者は大手上場役員ではないが、**PE投資＋COO実務＋診断士＋事業再生/成長支援**は同社が扱う「資金調達」「新規取引先開拓」「経営顧問・社外取締役」案件と親和性が高く、登録受理の可能性は相応にある（審査基準非公開のため確定不可）。
- 想定単価【推定】: 業界相場から経営顧問系で月10〜50万円/社、週1日規模で月30万円〜、複数社合算で月数十万円〜。AI業務自動化はDX推進案件で差別化要素。
- 獲得難易度: 中程度。上場役員OB層と競合する案件では見劣りの可能性。

## 2. 顧問バンク（株式会社顧問バンク）

**仕組み**
- 運営: 株式会社顧問バンク。**ダイレクトマッチング型（プラットフォーム型）**。企業が登録顧問DBを検索・スカウト、または案件票で公募。中間マージン不要で企業報酬100%が顧問に直接支払い。出典: https://common-bank.com/ ／ https://it-trend.jp/advisor_introduction_service/16030
- 登録顧問数は媒体で表記が揺れる（7,000／9,000／10,000超が併存、確定値なし）。出典: https://common-bank.com/ ／ https://dym.asia/media/advisor-bank/

**登録要件・審査**
- **顧問経験は不要**（業界・業務の経験ベースで可）。登録→審査→結果通知の**審査あり**。登録・維持無料、**個人のみ（法人不可）**。医療・弁護士等の許認可業務、正社員紹介・派遣は対象外。出典: https://common-bank.com/advisor/ ／ https://advisory.common-bank.com/faq.html

**報酬水準**
- **手数料率0%／報酬率100%**（企業→顧問へ直接）。出典: https://common-bank.com/advisor/ ／ https://advisory.common-bank.com/faq.html
- 公式「顧問希望者」ページの報酬例: **10〜20万円/商談・30,000円/時間・40〜100万円/月・5万円/月〜** など。額・働き方は当事者間の自由交渉（固定単価表なし）。出典: https://common-bank.com/advisor/ ／ https://common-bank.com/advisors/
- 参考（運営コラムの一般相場）: 経営顧問 月20〜50万円・時給1〜5万円、営業顧問（固定）月10〜50万円。出典: https://common-bank.com/column/service-cost/ ／ https://common-bank.com/column/komon_1691/

**稼働形態**
- 稼働頻度・報酬形態は当事者間で自由。スポット〜長期。**掛け持ち可**（公式事例で複数社契約中の顧問を紹介）。リモート可否は明記なし（未確認）。交通費等は企業と直接精算。出典: https://common-bank.com/advisors/ ／ https://advisory.common-bank.com/faq.html

**案件獲得難易度**
- **オファー型（スカウト）＋応募型（案件票）の併用**。公式は「未確定案件を自ら検索しアピールを推奨」＝顧問側の能動的応募が前提。営業ノルマの記載なし。第三者は「企業側が動かないとマッチングしない」と指摘（受け身だと来にくい構造）。出典: https://common-bank.com/advisors/ ／ https://advisory.common-bank.com/faq.html

**競業避止・秘密保持・利益相反 ／ 直接顧客化制約**
- FAQ・顧問向けページには具体規定の**記載が確認できず**（個別契約側に委ねる建付けと推測、規約原文は未取得）。中間マージン0・直接契約が売りのため成約後の直接契約自体は制限しないが、「サービス外直接取引の禁止／中抜き防止条項」の有無は未確認。解約は6ヶ月前申告。出典: https://advisory.common-bank.com/faq.html ／ https://common-bank.com/advisor/

**ネガティブ情報（口コミ）**
- 「顧問の契約単価が安すぎる」との評判（一方で企業は低コスト活用可、と両論併記）。「企業側が動かないとマッチングしない」「人・リード先の品質が担保されにくい」。出典: 検索スニペット（strate.biz は403で本文取得不可・freeconsul.co.jp・biz-solution-dx.com 各レビュー）
- 顧問本人の「案件が来ない／稼げない」一次体験記は複数検索でヒットせず（未確認）。

**候補者評価**
- 想定単価【推定】: 固定表なし。経歴的に経営顧問枠で月10〜50万円／時給1〜5万円レンジに乗る可能性。ただし小口・成果報酬案件（1商談10〜20万円、月5万円〜）も混在し**下振れも現実的**。
- 獲得難易度: 中〜やや難。1万人規模の登録者と競合するが、PE・政府系ファンド・COOの希少性でスカウトに拾われやすい。**AI業務自動化は中小のDXニーズと合致し武器**。「登録すれば来る」より継続的な案件応募＋プロフィール最適化が前提。

## 3. KENJINS（プライドワークス株式会社）

> **依頼前提の訂正**: 運営主体は「株式会社Kenjins／中村さん」ではなく **プライドワークス株式会社（PRIDEWORKS、代表 本田季伸、設立2014年8月）**。「KENJINS」は同社のサービス名。出典: https://kenjins.jp/contents/company.html

**仕組み**
- 「日本最大級の顧問契約マッチングサイト」を標榜。中核は**中間マージンゼロ／顧問報酬100%**（他社は月額報酬の50〜70%を中抜きと自称）。月額固定・アポイント報酬・売上成果報酬の複数型を企業が自由設定。成果報酬型セールス支援ラインもあり。契約条件取決め・契約書作成・請求・トラブル対応はKENJINSが担う。出典: https://kenjins.jp/ ／ https://kenjins.jp/lp/prokomon/

**登録要件・審査**
- 登録無料。シニアに限定せず**30〜40代の若手・女性も歓迎**。登録者5,000人超と自称。登録審査の明示要件はなくプロフィール登録制、選考は案件単位（書類選考→企業面談→オファー）。上位に**「プレミアム顧問」認定**（事務局が経歴・実績・企業評価を審査、条件に「受信メッセージ24時間以内返信率80%以上」）。出典: https://kenjins.jp/lp/prokomon/ ／ https://kenjins.jp/contents/premium.html

**報酬水準**
- 公式バナー記載レンジ: **月額20万〜100万円**（稼働は月2回〜週3回）。出典: https://kenjins.jp/adviser/
- 第三者比較サイト: 月額5万〜50万円／アポイント報酬3万円〜、マージン率0%。出典: https://arcward-c.co.jp/biz/kenjins/
- 顧問側の登録料・月額利用料・紹介手数料・中間マージンは一切なし（報酬100%）。固定単価表は非公開。出典: https://kenjins.jp/lp/prokomon/

**稼働形態**
- **リモート可／月2日〜週3日の半常勤が基本形**。週1〜5日の業務委託依頼も多数。スポット（1日）〜月20日まで幅あり。**掛け持ち・パラレルワーク歓迎**の案件が明示。出典: https://kenjins.jp/lp/prokomon/ ／ https://kenjins.jp/matter/list/

**案件獲得難易度**
- 公開案件一覧に40件＋「顧問登録者のみ公開100件」表示（公開＋半公開で約140件規模）。**紹介型＋自己エントリー＋スカウトのハイブリッド**、営業ノルマなし。ただし受注は書類選考＋企業面談通過が前提（応募＝受注ではない）。案件は**営業顧問（人脈・販路開拓型）が中心**、加えてPMI/PMO・資金調達・EC運営代行等。出典: https://kenjins.jp/matter/list/ ／ https://kenjins.jp/lp/prokomon/

**競業避止・秘密保持・利益相反（規約に明文あり）**
- 機密保持（規約第12条、目的外利用・第三者開示禁止）。**類似サービス禁止**（本サービスと同種・類似サービスの提供・準備行為の禁止）。違反時は損害賠償（第16・21条）。出典: https://kenjins.jp/contents/rules.html

**直接顧客化制約（明確に禁止）**
- 規約第6条: **本サービスを利用せずクライアントと直接契約する行為・準備行為を禁止**（企業側にも同趣旨の第20条）。違反時は登録抹消・取引全停止・損害賠償。出典: https://kenjins.jp/contents/rules.html

**ネガティブ情報（口コミ）**
- 独立系の否定的口コミは公開Web上ほぼなし。ヒットする第三者記事はアフィリエイト／PR色が強い点に留意。口コミ集約サイトで総合3.0/5.0（1件のみ）、支払いは月末締め翌月末払い。「応募・書類通過後、企業からの連絡待ちで時間がかかる」との運用面の指摘。出典: https://minnanocareer.agent-network.com/service/1683/ ／ https://arcward-c.co.jp/biz/kenjins/

**候補者評価**
- 登録適格性: 問題なし。経営改革・新規事業・資金調達・PMI/PMOなど得意分野例に合致、プレミアム顧問も狙える経歴。
- 想定単価【推定】: 公式20万〜100万円と第三者5万〜50万円の重ね合わせで、月2〜3日稼働なら**月20万〜50万円が中心帯**、上振れは大企業商談を伴う営業顧問・資金調達成功報酬型で発生。
- 獲得難易度: 中程度。**需要が「大手への人脈・販路を持つ営業顧問」に強く寄る**ため、決裁者クラスの人脈が弱いと営業顧問系の選考通過率は限定的。AI自動化・PMO・資金調達文脈で差別化できれば有利。

## 4. マイナビ顧問（株式会社マイナビ）

**仕組み**
- 運営: 株式会社マイナビ。**エージェント（紹介）型**。全国のマイナビグループ法人営業担当が、経験・要望に合う顧問アドバイザリー案件を紹介。契約は原則「業務委託契約のみ」（案件により正社員も可）。出典: https://komon.suki-iki.mynavi.jp/ ／ https://komon.suki-iki.mynavi.jp/personal

**登録要件・審査**
- 登録無料。想定登録者像は「元大手上場役員・取締役・海外事業責任者・大学教授・会計士・コンサルファーム出身者」。明示的資格要件はないが「要件によっては面談を実施できない場合がある」＝事実上のスクリーニングあり。出典: https://komon.suki-iki.mynavi.jp/ ／ https://komon.suki-iki.mynavi.jp/personal

**報酬水準**
- **公式は非公開**。FAQ「報酬額は企業・案件により異なる、マッチング時に確認」。第三者比較サイトも「要問い合わせ」。出典: https://komon.suki-iki.mynavi.jp/faq ／ https://strate.biz/pro_matching/mynavi_komon
- 参考（一般相場・代理指標）: 経営顧問 月10〜50万円/時間契約3〜10万円、営業顧問 月15〜60万円、成果報酬型は利益の10〜30%。出典: https://pasona-proshare.com/column/professional/komon-remuneration-marketprice
- マイナビのマージン率は非公開（未確認）。

**稼働形態**
- 「月1回〜複数社〜期限付き常勤まで自由設定」。契約は**最低3ヶ月から**。**掛け持ち（複数社契約）可**。リモート可否の明示なし（未確認）。出典: https://komon.suki-iki.mynavi.jp/personal ／ https://komon.suki-iki.mynavi.jp/faq

**案件獲得難易度**
- 2ルート:（a）毎週の紹介メール掲載案件へ応募、（b）経歴マッチ時に企業担当営業から直接連絡。顧問側の営業ノルマなし（登録・紹介待ち型）。**案件総数・求人数は公式方針で非公開**。規約で「必ずしも契約に導かない可能性」を明記＝**紹介保証なし**。出典: https://komon.suki-iki.mynavi.jp/faq ／ https://komon.suki-iki.mynavi.jp/rules ／ https://consulgo.jp/article/mynavi-komon/

**競業避止・秘密保持・利益相反**
- 利用規約（第1〜12条）に**明示的な競業避止・利益相反条項は見当たらない**。守秘は限定的（第7条(g) 入手情報の複製・販売・出版等の禁止のみ）で包括的守秘条項なし（実際の守秘は個別業務委託契約側に委ねる想定）。出典: https://komon.suki-iki.mynavi.jp/rules

**直接顧客化制約（事前通知義務のみ）**
- 規約第6条5項: 紹介先と当社を介さず直接契約する場合は**事前通知するものとする**。＝**全面禁止ではなく事前通知義務**。違約金・直接契約禁止の明文は規約本文に確認できず（別途契約で規定の可能性）。出典: https://komon.suki-iki.mynavi.jp/rules

**ネガティブ情報（口コミ）**
- 公式は「SNS上で否定的投稿は見つかっていない」旨掲載。第三者のデメリットは主に企業側視点（「最低契約3〜6ヶ月でスポット不可」「オーダーメイド型でコスト高」）。顧問側の「単価が出ない／案件が来ない」体験談は今回の検索では未発見（未確認）。出典: https://consulgo.jp/article/mynavi-komon/ ／ https://strate.biz/pro_matching/mynavi_komon ／ https://sheepdog.co.jp/pro_matching/mynavi_komon/

**候補者評価**
- 登録適性は高い（想定登録者像にCOO＋PE＋診断士が合致、面談通過の可能性高）。マッチ領域は経営相談・全社戦略・組織構築・資金繰り・新規事業。
- 想定単価【推定・相場ベース】: 固有単価は非公開。相場から経営アドバイザリー固定で月10〜50万円/社、稼働軽め（月1〜2回）の非常勤なら月10〜30万円/社が現実的、掛け持ちで合算上積み可。
- 獲得難易度: 書類段階は低〜中だが、**案件総数非公開・紹介保証なし・紹介数量依存で成約は不確実**。AI業務自動化は独立カテゴリがなく、経営顧問／営業顧問枠での訴求が現実的。政府系・PE・COO実績は差別化要素。

## 調査の限界と未確認事項

1. **顧問側の実受取単価**は、顧問名鑑・マイナビ顧問・パソナ・エッセンスとも**公式に単価表を開示していない**。本文の「相場」は各社コラム／第三者由来の業界一般相場で、当該プラットフォームでの実額を保証しない。ビザスクの「受取70%・下限/参考額」も公式ヘルプ引用の二次情報（公式原文の直接確認は一部未完了）。
2. **各社のマージン率**（企業支払額に対する顧問受取比率）は、KENJINS・顧問バンク（ともに0%標榜）とビザスク（30%）以外は非公開。
3. **競業避止・秘密保持・利益相反・直接顧客化の制約**を公式規約で明確に確認できたのは **KENJINS（直接契約禁止・類似サービス禁止が明文）／ビザスク（守秘・利益相反・迂回禁止・直接取引禁止が明文）／みらいワークスNDA（関係者接触禁止）** のみ。顧問名鑑・顧問バンク・パソナ・エッセンスは公開範囲では未確認（会員契約・個別業務委託契約側に規定の可能性）。マイナビ顧問は**「事前通知義務」のみで全面禁止ではない**。
4. **リモート可否**を明文で確認できたのはKENJINS（リモート可）・エッセンス（リモート対応あり）等に限られ、他社は明記なし（未確認）。
5. **登録顧問数**は媒体・時期で数値に幅（顧問バンク7,000〜10,000超、パソナ5,000/15,000/60,000名が併存など）。
6. **顧問本人視点のネガティブ体験談**（「単価が出ない／案件が来ない」等のnote・個人ブログ一次情報）は、各社ともほぼ発見できず。ヒットする第三者記事の多くはアフィリエイト／PR色が強い。
7. strate.biz の各評判ページはHTTP 403で本文を直接取得できず、検索スニペットで確認した箇所がある。
8. 依頼の**「エッセンス Professional Hub」は実在せず、正式名は「プロパートナーズ」**。依頼元での名称再確認を推奨。
9. 各サービスの**会員登録後にのみ開示される単価テーブル・案件詳細**には未到達（公開・非ログイン範囲のみ調査）。

---

## 次に深掘りするなら

- 登録フォーム送信後に届く案内・面談で提示される**実単価テーブルとマージン説明**（会員限定・今回未到達）。
- ミドル/シニア顧問の**note・X等での実名レビュー**の継続監視（顧問側一次情報の補強）。
- 候補者の経歴に最も合う**「週1〜2日・月40〜60万円級の経営/CFO/新規事業伴走案件」**の実在確認（エッセンス・パソナ・KENJINS・顧問バンクを横断で）。
- 各社の**利用規約・業務委託契約書の原本**を入手し、競業避止・中抜き防止・契約期間を精査（特に候補者が複数社掛け持ち＋将来的な直接顧客化を想定する場合の制約）。
- ビザスクの**業務委託（partner/direct）**での候補者想定単価の実データ確認（スポットより高単価が見込める）。
